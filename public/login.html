<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rusteez — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #070708;
            color: #e6edf3;
            font-family: Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 720px;
            padding: 36px;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .heroTitle {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }

        .sub {
            color: #9aa3ad;
            margin-bottom: 18px;
        }

        .discordBtn {
            background: #5865f2;
            color: white;
            padding: 14px 18px;
            border-radius: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .muted {
            color: #8a97a1;
            margin-top: 16px;
        }

        .admin-link {
            color: #93c5fd;
            text-decoration: underline;
            cursor: pointer;
        }

        .token-area {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        input {
            background: #0f1720;
            border: 1px solid rgba(255,255,255,0.04);
            padding: 10px 12px;
            border-radius: 8px;
            color: #e6edf3;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Rusteez</div>
        <div class="heroTitle">Sign in to access your dashboard</div>
        <div class="sub">Authentification sécurisée via Discord</div>

        <div>
            <a class="discordBtn" id="discordBtn" href="/auth/discord">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 20.5l-3-2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" /></svg>
                Continue with Discord
            </a>
        </div>

        <div class="muted" style="margin-top:22px;">
            Si vous êtes admin, cliquez <span class="admin-link" id="adminOpen">Admin</span> pour utiliser un token.
        </div>

        <div id="tokenArea" class="token-area" style="display:none; margin-top:18px;">
            <input id="adminToken" placeholder="ADMIN_TOKEN" type="password" />
            <button id="useToken" style="background:#06b6d4;color:#071014;padding:10px 12px;border-radius:8px;font-weight:700;border:none">OK</button>
        </div>

        <div id="error" style="color:#ff7b7b;margin-top:10px;display:none">Authentification impossible</div>
    </div>

    <script>// show admin token input
  document.getElementById('adminOpen').addEventListener('click', () => {
    document.getElementById('tokenArea').style.display = 'flex';
    document.getElementById('adminToken').focus();
  });

  // token login: verify then redirect to dashboard
  document.getElementById('useToken').addEventListener('click', async () => {
    const token = document.getElementById('adminToken').value.trim();
    if (!token) return;
    try {
      const res = await fetch(`/api/admin/verify?token=${encodeURIComponent(token)}`);
      const json = await res.json();
      if (json && json.success) {
        localStorage.setItem('rs_token', token);
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    } catch {
      document.getElementById('error').style.display = 'block';
    }
  });

  // handle OAuth redirect returning ?token=SESSION
  (function() {
    const params = new URLSearchParams(window.location.search);
    const tok = params.get('token');
    if (tok) {
      // verify then store and redirect
      fetch(`/api/admin/verify?token=${encodeURIComponent(tok)}`)
        .then(r => r.json())
        .then(data => {
          if (data && data.success) {
            localStorage.setItem('rs_token', tok);
            history.replaceState({}, document.title, '/login.html');
            window.location.href = '/dashboard.html';
          } else {
            // invalid
          }
        }).catch(()=>{});
    }
  })();</script>
</body>
</html>
