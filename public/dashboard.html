<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background-color: #080a11;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
        }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 4px; }
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; color: #64748b; text-transform: uppercase; font-weight: 900; font-size: 10px; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .data-card { background: #111827; border: 1px solid #1f2937; transition: all 0.3s; position: relative; }
        .data-card:hover { border-color: #a855f7; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
        input, textarea, select, button { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
        .copy-success { color: #10b981 !important; }
        .setup-btn { background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; transition: all 0.3s; }
        .setup-btn:hover { border-color: #a855f7; transform: translateY(-2px); }
        .sortable { cursor: pointer; user-select: none; }
        .group-header { background: #0b1220; padding: 6px 10px; border-radius: 4px; margin-top: 8px; font-weight: 700; color: #c7b3ff; }
        thead th { position: sticky; top: 0; background: #0b1220; z-index: 2; }
        .auth-actions { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .small-btn { font-size: 11px; padding: 8px 12px; border-radius: 6px; }
        .muted { color: #94a3b8; font-size: 11px; margin-top: 8px; text-align: center; }
        .muted a { color: #93c5fd; text-decoration: underline; cursor: pointer; }
        .user-badge { display:flex; align-items:center; gap:8px; font-size:12px; color:#cbd5e1; padding:6px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); background: rgba(255,255,255,0.01); }
        .user-avatar { width:32px; height:32px; border-radius:999px; object-fit:cover; }
        .leaderboard-table { width:100%; border-collapse:collapse; margin-top:8px; }
        .leaderboard-table th, .leaderboard-table td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.03); text-align:left; vertical-align:middle; }
        .leader-avatar { width:40px; height:40px; border-radius:999px; object-fit:cover; }
    </style>
</head>
<body class="p-6">

    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/40 p-5 border border-slate-800 rounded">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Rusteez <span class="text-purple-500">Master</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Database & Stats Management</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="userInfo" class="user-badge">
                    <img id="userAvatar" class="user-avatar" src="" alt="avatar" style="display:none" />
                    <span id="userName">—</span>
                </div>
                <button id="logoutBtn" class="px-3 py-1 rounded bg-red-600 text-white text-xs">Logout</button>
            </div>
        </header>

        <nav class="flex gap-1 mb-6 border-b border-slate-800">
            <button onclick="switchTab('collection')" id="tab-collection" class="tab-btn active px-8 py-4">Collection</button>
            <button onclick="switchTab('bases')" id="tab-bases" class="tab-btn px-8 py-4">Bases</button>
            <button onclick="switchTab('hits')" id="tab-hits" class="tab-btn px-8 py-4">Hits</button>
            <button onclick="switchTab('create')" id="tab-create" class="tab-btn px-8 py-4 text-green-400"><i class="fa fa-magic mr-2"></i>Create Script</button>
            <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="tab-btn px-8 py-4 text-yellow-400"><i class="fa fa-trophy mr-2"></i>Leaderboard</button>
        </nav>

        <!-- Controls: search + group -->
        <div class="flex gap-3 items-center mb-4">
            <input id="searchInput" type="text" placeholder="Recherche (BaseName, Name, Rarity, Mutation, Traits)..." class="p-2 rounded flex-1" />
            <select id="groupSelect" class="p-2 rounded">
                <option value="none">Pas de groupement</option>
                <option value="BaseName">Group by BaseInfo.Name</option>
                <option value="Name">Group by Name</option>
                <option value="Rarity">Group by Rarity</option>
                <option value="Mutation">Group by Mutation</option>
            </select>
            <button id="refreshBtn" class="px-4 py-2 rounded bg-purple-600 hover:bg-purple-500">Refresh</button>
        </div>

        <section id="content-collection" class="mb-6">
            <div id="gridContainer" class="data-card p-4 overflow-auto max-h-[60vh]">
                <div id="gridToolbar" class="mb-2 text-[10px] text-slate-400">Chargement...</div>
                <div id="gridArea"></div>
            </div>
        </section>

        <section id="content-bases" class="hidden mb-6">
            <div id="basesContainer" class="data-card p-4 overflow-auto max-h-[60vh]">
                <div id="basesToolbar" class="mb-2 text-[10px] text-slate-400">Chargement...</div>
                <div id="basesArea"></div>
            </div>
        </section>

        <section id="content-hits" class="hidden"></section>

        <section id="content-create" class="hidden mb-6">
            <div class="data-card p-4">
                <h2 class="text-sm font-bold mb-3">Create Script Loader</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] text-slate-400">Minimum Brainrots Income</label>
                        <input id="inputMinIncome" type="number" class="w-full p-2 rounded mt-1" placeholder="30000000" />
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400">Maximum Brainrots</label>
                        <input id="inputMaxItems" type="number" class="w-full p-2 rounded mt-1" placeholder="10" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">Roblox Usernames, separated by commas</label>
                        <input id="inputTargets" type="text" class="w-full p-2 rounded mt-1" placeholder="User1,User2,..." />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">WebHook URL</label>
                        <input id="inputWebhook" type="text" class="w-full p-2 rounded mt-1" placeholder="WebHook URL ex:(https://...)" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">Visual (optionnel)</label>
                        <input id="inputVisual" type="text" class="w-full p-2 rounded mt-1" placeholder="Script URL ou empty ex:(https://...)" />
                    </div>
                </div>

                <div class="flex gap-2 mt-4">
                    <button id="btnCreateScript" class="px-4 py-2 bg-green-600 rounded hover:bg-green-500">Create Script</button>
                    <button id="btnCopyScript" class="px-4 py-2 bg-slate-700 rounded hover:bg-slate-600">Copy to clipboard</button>
                </div>

                <div class="mt-4">
                    <label class="text-[11px] text-slate-400">Generated Script (Lua)</label>
                    <textarea id="generatedScript" rows="10" class="w-full p-2 rounded mt-1 font-mono text-xs"></textarea>
                    <div id="createLoaderText" class="loader-container hidden">
                        <div class="loader-spinner" aria-hidden="true"></div>
                        <div class="loader-text">Votre Script est en cours de création...</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="content-leaderboard" class="hidden mb-6">
            <div class="data-card p-4">
                <h2 class="text-sm font-bold mb-3">Leaderboard</h2>
                <div id="leaderboardArea" class="overflow-auto max-h-[60vh]">
                    <div class="text-slate-400">Chargement...</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Authentication: require token stored in cookie 'rs_token' or localStorage
        (async function verify() {
            function getCookie(name) {
                const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
                return m ? decodeURIComponent(m.pop()) : null;
            }
            const token = getCookie('rs_token') || localStorage.getItem('rs_token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            try {
                const res = await fetch(`/api/admin/verify?token=${encodeURIComponent(token)}`);
                const json = await res.json();
                if (!json || !json.success) {
                    document.cookie = 'rs_token=; max-age=0; path=/';
                    localStorage.removeItem('rs_token');
                    window.location.href = '/login.html';
                    return;
                }

                window.GLOBAL_TOKEN = token;
                document.getElementById('admin-content').classList.remove('hidden');

                // show discord username and avatar if available
                if (json.user) {
                    const elName = document.getElementById('userName');
                    const elAvatar = document.getElementById('userAvatar');
                    if (json.user.username) elName.innerText = json.user.username;
                    if (json.user.id && json.user.avatar) {
                        const avatarHash = json.user.avatar;
                        const isAnimated = avatarHash.startsWith('a_');
                        const ext = isAnimated ? 'gif' : 'png';
                        const url = `https://cdn.discordapp.com/avatars/${json.user.id}/${avatarHash}.${ext}?size=64`;
                        elAvatar.src = url;
                        elAvatar.style.display = 'inline-block';
                    } else {
                        elAvatar.style.display = 'none';
                    }
                }

                // load initial leaderboard
                loadLeaderboard();

            } catch (err) {
                document.cookie = 'rs_token=; max-age=0; path=/';
                localStorage.removeItem('rs_token');
                window.location.href = '/login.html';
            }
        })();

        // logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            document.cookie = 'rs_token=; max-age=0; path=/';
            localStorage.removeItem('rs_token');
            window.location.href = '/login.html';
        });

        function switchTab(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const content = document.getElementById('content-' + name);
            if (content) content.classList.remove('hidden');
            const tabEl = document.getElementById('tab-' + name);
            if (tabEl) tabEl.classList.add('active');

            // lazy load leaderboard when opened
            if (name === 'leaderboard') loadLeaderboard();
        }

        async function loadLeaderboard() {
            const area = document.getElementById('leaderboardArea');
            area.innerHTML = '<div class="text-slate-400">Chargement...</div>';
            try {
                const res = await fetch('/api/users');
                const json = await res.json();
                if (!json || !json.success || !Array.isArray(json.data)) {
                    area.innerHTML = '<div class="text-red-500">Erreur chargement leaderboard</div>';
                    return;
                }

                if (json.data.length === 0) {
                    area.innerHTML = '<div class="text-slate-400">Aucun utilisateur</div>';
                    return;
                }

                const rows = json.data.map((u, idx) => {
                    const avatar = u.AvatarUrl ? `<img src="${u.AvatarUrl}" class="leader-avatar" alt="avatar" />` : `<div class="leader-avatar" style="background:#1f2937;display:inline-block"></div>`;
                    return `
                        <tr>
                            <td style="width:60px">${idx + 1}</td>
                            <td style="width:60px">${avatar}</td>
                            <td style="min-width:220px">
                                <div style="font-weight:700">${u.Username || 'Unknown'}</div>
                                <div style="color:#94a3b8;font-size:11px">id: ${u.Id}</div>
                            </td>
                            <td style="text-align:right;font-weight:800;color:#facc15">${u.HitCount}</td>
                        </tr>
                    `;
                }).join('');

                area.innerHTML = `
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th></th>
                                <th>User</th>
                                <th style="text-align:right">Hits</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                area.innerHTML = '<div class="text-red-500">Erreur réseau</div>';
            }
        }

        // wire create script button to call server endpoint if desired
        document.getElementById('btnCreateScript')?.addEventListener('click', async () => {
            const minIncome = Number(document.getElementById('inputMinIncome').value || 0);
            const maxItems = Number(document.getElementById('inputMaxItems').value || 0);
            const targets = document.getElementById('inputTargets').value || '';
            const webhook = document.getElementById('inputWebhook').value || '';
            const visual = document.getElementById('inputVisual').value || '';

            try {
                const res = await fetch(`/api/create-script?token=${encodeURIComponent(window.GLOBAL_TOKEN)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ minIncome, maxItems, targets, webhookurl: webhook, visual, discordUserId: window.DISCORD_USER_ID || null })
                });
                const json = await res.json();
                if (json && json.success && json.data) {
                    document.getElementById('generatedScript').value = json.data.Script;
                } else {
                    alert('Erreur création script');
                }
            } catch (err) {
                alert('Erreur connexion serveur');
            }
        });

        // copy script
        document.getElementById('btnCopyScript')?.addEventListener('click', async () => {
            const txt = document.getElementById('generatedScript').value || '';
            if (!txt) return alert('Aucun script généré.');
            try {
                await navigator.clipboard.writeText(txt);
                const btn = document.getElementById('btnCopyScript');
                const prev = btn.innerText;
                btn.innerText = 'Copié !';
                setTimeout(() => btn.innerText = prev, 1500);
            } catch {
                alert('Impossible de copier (clipboard non supporté).');
            }
        });
    </script>
</body>
</html>
