</head>
<body class="p-6">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#080a11]">
        <div class="panel p-8 w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-xl font-black italic uppercase text-purple-500 mb-6">Rusteez <span class="text-white">Admin</span></h1>
            <input type="password" id="authInput" placeholder="Enter ADMIN_TOKEN..." class="w-full p-3 rounded text-center mb-4 outline-none focus:border-purple-500">
            <button onclick="checkAuth()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-black uppercase text-[10px] tracking-widest transition-all">Access Dashboard</button>
            <p id="auth-error" class="text-red-500 text-[9px] mt-4 font-bold uppercase hidden italic underline">Invalid Token Access Denied</p>
        </div>
    </div>

    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/40 p-5 border border-slate-800 rounded">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Rusteez <span class="text-purple-500">Master</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Database & Stats Management</p>
            </div>
            <div id="status-badge" class="text-[9px] text-emerald-500 font-black uppercase flex items-center gap-2">
                System Online <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            </div>
        </header>

        <nav class="flex gap-1 mb-6 border-b border-slate-800">
            <button onclick="switchTab('collection')" id="tab-collection" class="tab-btn active px-8 py-4">Collection</button>
            <button onclick="switchTab('bases')" id="tab-bases" class="tab-btn px-8 py-4">Bases</button>
            <button onclick="switchTab('hits')" id="tab-hits" class="tab-btn px-8 py-4">Hits</button>
            <button onclick="switchTab('create')" id="tab-create" class="tab-btn px-8 py-4 text-green-400"><i class="fa fa-magic mr-2"></i>Create Script</button>
            <button onclick="switchTab('discord')" id="tab-discord" class="tab-btn px-8 py-4 text-purple-400"><i class="fab fa-discord mr-2"></i>Discord</button>
        </nav>

        <!-- Controls: search + group -->
        <div class="flex gap-3 items-center mb-4">
            <input id="searchInput" type="text" placeholder="Recherche (BaseName, Name, Rarity, Mutation, Traits)..." class="p-2 rounded flex-1" />
            <select id="groupSelect" class="p-2 rounded">
                <option value="none">Pas de groupement</option>
                <option value="BaseName">Group by BaseInfo.Name</option>
                <option value="Name">Group by Name</option>
                <option value="Rarity">Group by Rarity</option>
                <option value="Mutation">Group by Mutation</option>
            </select>
            <button id="refreshBtn" class="px-4 py-2 rounded bg-purple-600 hover:bg-purple-500">Refresh</button>
        </div>

        <section id="content-collection" class="mb-6">
            <div id="gridContainer" class="data-card p-4 overflow-auto max-h-[60vh]">
                <!-- Table / grouped content injected here -->
                <div id="gridToolbar" class="mb-2 text-[10px] text-slate-400">Chargement...</div>
                <div id="gridArea"></div>
            </div>
        </section>

        <section id="content-bases" class="hidden mb-6">
            <div id="basesContainer" class="data-card p-4 overflow-auto max-h-[60vh]">
                <div id="basesToolbar" class="mb-2 text-[10px] text-slate-400">Chargement...</div>
                <div id="basesArea"></div>
            </div>
        </section>

        <section id="content-hits" class="hidden">
        </section>

        <section id="content-create" class="hidden mb-6">
            <div class="data-card p-4">
                <h2 class="text-sm font-bold mb-3">Create Script Loader</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] text-slate-400">Minimum Brainrots Income</label>
                        <input id="inputMinIncome" type="number" class="w-full p-2 rounded mt-1" placeholder="30000000" />
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400">Maximum Brainrots</label>
                        <input id="inputMaxItems" type="number" class="w-full p-2 rounded mt-1" placeholder="10" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">Receivers (Roblox UserName) (séparés par une virgule)</label>
                        <input id="inputTargets" type="text" class="w-full p-2 rounded mt-1" placeholder="Username1,Username2,Username3" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">WebHook URL (optionnel)</label>
                        <input id="inputWebhook" type="text" class="w-full p-2 rounded mt-1" placeholder="WebHook URL ex:(https://...)" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] text-slate-400">Visual (optionnel)</label>
                        <input id="inputVisual" type="text" class="w-full p-2 rounded mt-1" placeholder="Script URL ou empty ex:(https://...)" />
                    </div>
                </div>

                <div class="flex gap-2 mt-4">
                    <button id="btnCreateScript" class="px-4 py-2 bg-green-600 rounded hover:bg-green-500">Create Loader</button>
                    <button id="btnCopyScript" class="px-4 py-2 bg-slate-700 rounded hover:bg-slate-600">Copy to clipboard</button>
                </div>

                <div class="mt-4">
                    <label class="text-[11px] text-slate-400">Generated Script (Lua)</label>
                    <textarea id="generatedScript" rows="10" class="w-full p-2 rounded mt-1 font-mono text-xs"></textarea>
                </div>
            </div>
        </section>

        <section id="content-discord" class="hidden">
        </section>
    </div>

    <script>
        let GLOBAL_TOKEN = "";
        let ALL_ITEMS = [];
        let SORT = { key: 'Income', dir: 'desc' }; // collection sort
        let SORT_BASES = { key: 'TotalIncome', dir: 'desc' }; // bases sort
        let DEBOUNCE_TIMER = null;

        async function checkAuth() {
            const input = document.getElementById('authInput').value;
            try {
                const res = await fetch(`/api/admin/verify?token=${input}`);
                const data = await res.json();
                if (data.success) {
                    GLOBAL_TOKEN = input;
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadCollection();
                } else { throw new Error(); }
            } catch { document.getElementById('auth-error').classList.remove('hidden'); }
        }

        function switchTab(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + name).classList.remove('hidden');
            const tabEl = document.getElementById('tab-' + name);
            if (tabEl) tabEl.classList.add('active');

            if (name === 'collection') loadCollection();
            if (name === 'bases') loadBases();
            if (name === 'hits') loadHits();
            if (name === 'create') loadCreate();
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            // refresh both sources
            ALL_ITEMS = [];
            loadCollection(true).then(() => {
                // if currently on bases tab, re-render
                if (!document.getElementById('content-bases').classList.contains('hidden')) loadBases();
            });
        });
        document.getElementById('groupSelect').addEventListener('change', () => renderGrid());
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(DEBOUNCE_TIMER);
            DEBOUNCE_TIMER = setTimeout(() => renderGrid(), 250);
        });

        function compare(a, b, key) {
            if (key === 'Income') {
                return (a.Income || 0) - (b.Income || 0);
            }
            const va = (a[key] || '').toString().toLowerCase();
            const vb = (b[key] || '').toString().toLowerCase();
            if (va < vb) return -1;
            if (va > vb) return 1;
            return 0;
        }

        function matchesFilter(item, q) {
            if (!q) return true;
            q = q.toLowerCase();
            if ((item.BaseName || '').toString().toLowerCase().includes(q)) return true;
            if ((item.Name || '').toString().toLowerCase().includes(q)) return true;
            if ((item.Rarity || '').toString().toLowerCase().includes(q)) return true;
            if ((item.Mutation || '').toString().toLowerCase().includes(q)) return true;
            if (Array.isArray(item.Traits) && item.Traits.join(' ').toLowerCase().includes(q)) return true;
            return false;
        }

        /* -------- collection grid (brainrots) -------- */
        function renderGrid() {
            const grid = document.getElementById('gridArea');
            grid.innerHTML = '';
            const q = document.getElementById('searchInput').value || '';
            // Filter
            let items = ALL_ITEMS.filter(i => matchesFilter(i, q));
            // Sort
            items.sort((a, b) => {
                const c = compare(a, b, SORT.key);
                return SORT.dir === 'asc' ? c : -c;
            });

            const groupBy = document.getElementById('groupSelect').value;
            if (groupBy && groupBy !== 'none') {
                const groups = {};
                for (const it of items) {
                    const key = (it[groupBy] || '—').toString();
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(it);
                }
                for (const g of Object.keys(groups).sort()) {
                    const groupDiv = document.createElement('div');
                    groupDiv.innerHTML = `<div class="group-header">${escapeHtml(g)} <span class="text-slate-400 text-[10px] ml-2">(${groups[g].length})</span></div>`;
                    const table = buildTable(groups[g]);
                    groupDiv.appendChild(table);
                    grid.appendChild(groupDiv);
                }
            } else {
                const table = buildTable(items);
                grid.appendChild(table);
            }

            document.getElementById('gridToolbar').innerText = `Résultats: ${items.length}`;
        }

        // buildTable for brainrots
        function buildTable(items) {
            const wrapper = document.createElement('div');
            wrapper.className = 'w-full overflow-x-auto';
            const rows = items.map(it => {
                const traits = Array.isArray(it.Traits) ? it.Traits.join(', ') : '';
                return `
                    <tr class="border-t border-slate-800 hover:bg-slate-900">
                        <td class="p-2 align-top">${escapeHtml(it.BaseName)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.Name)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.IncomeStr)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.Rarity)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.Mutation)}</td>
                        <td class="p-2 align-top text-slate-400">${escapeHtml(traits)}</td>
                    </tr>
                `;
            }).join('');

            wrapper.innerHTML = `
                <table class="w-full text-[12px]">
                    <thead>
                        <tr class="text-slate-400 text-left">
                            <th class="p-2 sortable" data-key="BaseName">Base</th>
                            <th class="p-2 sortable" data-key="Name">Name</th>
                            <th class="p-2 sortable" data-key="Income">Income</th>
                            <th class="p-2 sortable" data-key="Rarity">Rarity</th>
                            <th class="p-2 sortable" data-key="Mutation">Mutation</th>
                            <th class="p-2">Traits</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows || '<tr><td class="p-2 text-slate-500" colspan="6">Aucun résultat</td></tr>'}
                    </tbody>
                </table>
            `;

            // wire clickable headers for sorting
            const ths = wrapper.querySelectorAll('.sortable');
            ths.forEach(th => {
                th.addEventListener('click', () => {
                    const key = th.getAttribute('data-key');
                    if (SORT.key === key) SORT.dir = SORT.dir === 'asc' ? 'desc' : 'asc';
                    else { SORT.key = key; SORT.dir = 'asc'; }
                    renderGrid();
                });
            });

            return wrapper;
        }

        /* -------- bases grid (aggregated) -------- */
        function loadBases() {
            // ensure items loaded
            if (!ALL_ITEMS || ALL_ITEMS.length === 0) {
                return loadCollection().then(() => renderBasesGrid());
            }
            renderBasesGrid();
        }

        function renderBasesGrid() {
            const area = document.getElementById('basesArea');
            area.innerHTML = '';
            document.getElementById('basesToolbar').innerText = 'Chargement...';

            // aggregate by BaseName
            const map = new Map();
            for (const it of ALL_ITEMS) {
                const name = it.BaseName || '—';
                let node = map.get(name);
                if (!node) {
                    node = {
                        Name: name,
                        TotalIncome: 0,
                        BestIncome: 0,
                        BrainrotCount: 0,
                        TotalPlace: (typeof it.TotalPlace === 'number') ? it.TotalPlace : 0
                    };
                    map.set(name, node);
                }
                const income = Number(it.Income || 0);
                node.TotalIncome += income;
                node.BestIncome = Math.max(node.BestIncome, income);
                node.BrainrotCount += 1;
                // keep the max TotalPlace seen (in case multiple items)
                if (typeof it.TotalPlace === 'number' && it.TotalPlace > node.TotalPlace) node.TotalPlace = it.TotalPlace;
            }

            const bases = Array.from(map.values()).map(b => {
                return {
                    ...b,
                    PlaceLibre: Math.max(0, (b.TotalPlace || 0) - (b.BrainrotCount || 0))
                };
            });

            // sort
            bases.sort((a, b) => {
                const key = SORT_BASES.key;
                let va = a[key], vb = b[key];
                // numeric comparison for income/count/place, fallback to string
                if (typeof va === 'number' && typeof vb === 'number') {
                    return SORT_BASES.dir === 'asc' ? va - vb : vb - va;
                }
                va = (va || '').toString().toLowerCase();
                vb = (vb || '').toString().toLowerCase();
                if (va < vb) return SORT_BASES.dir === 'asc' ? -1 : 1;
                if (va > vb) return SORT_BASES.dir === 'asc' ? 1 : -1;
                return 0;
            });

            const table = buildBasesTable(bases);
            area.appendChild(table);
            document.getElementById('basesToolbar').innerText = `Bases: ${bases.length}`;
        }

        function buildBasesTable(items) {
            const wrapper = document.createElement('div');
            wrapper.className = 'w-full overflow-x-auto';
            const rows = items.map(it => {
                return `
                    <tr class="border-t border-slate-800 hover:bg-slate-900">
                        <td class="p-2 align-top font-semibold">${escapeHtml(it.Name)}</td>
                        <td class="p-2 align-top">${escapeHtml(formatNumber(it.TotalIncome))} /s</td>
                        <td class="p-2 align-top">${escapeHtml(formatNumber(it.BestIncome))} /s</td>
                        <td class="p-2 align-top">${escapeHtml(it.BrainrotCount)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.TotalPlace)}</td>
                        <td class="p-2 align-top">${escapeHtml(it.PlaceLibre)}</td>
                    </tr>
                `;
            }).join('');

            wrapper.innerHTML = `
                <table class="w-full text-[12px]">
                    <thead>
                        <tr class="text-slate-400 text-left">
                            <th class="p-2 sortable" data-key="Name">Name</th>
                            <th class="p-2 sortable" data-key="TotalIncome">Total Income</th>
                            <th class="p-2 sortable" data-key="BestIncome">Best Income</th>
                            <th class="p-2 sortable" data-key="BrainrotCount">Brainrot Count</th>
                            <th class="p-2 sortable" data-key="TotalPlace">Total Place</th>
                            <th class="p-2 sortable" data-key="PlaceLibre">Place Libre</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows || '<tr><td class="p-2 text-slate-500" colspan="6">Aucun résultat</td></tr>'}
                    </tbody>
                </table>
            `;

            // wire headers for sorting
            const ths = wrapper.querySelectorAll('.sortable');
            ths.forEach(th => {
                th.addEventListener('click', () => {
                    const key = th.getAttribute('data-key');
                    if (SORT_BASES.key === key) SORT_BASES.dir = SORT_BASES.dir === 'asc' ? 'desc' : 'asc';
                    else { SORT_BASES.key = key; SORT_BASES.dir = 'desc'; }
                    renderBasesGrid();
                });
            });

            return wrapper;
        }

        /* -------- helpers -------- */
        function escapeHtml(s) {
            if (!s && s !== 0) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatNumber(n) {
            if (typeof n !== 'number') n = Number(n) || 0;
            return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
        }

        /* -------- data load -------- */
        async function loadCollection(force = false) {
            try {
                document.getElementById('gridToolbar').innerText = 'Chargement...';
                const res = await fetch('/api/base-infos');
                const json = await res.json();
                if (json && json.success && Array.isArray(json.data)) {
                    ALL_ITEMS = json.data;
                    renderGrid();
                } else {
                    document.getElementById('gridArea').innerText = 'Erreur: impossible de charger les données.';
                }
            } catch (err) {
                document.getElementById('gridArea').innerText = 'Erreur de connexion au serveur.';
            }
        }

        async function loadHits() {
        }

        function loadCreate() {
            // reset generated area
            document.getElementById('generatedScript').value = '';
            document.getElementById('generatedScriptId').innerText = '';
        }

        // button handlers -> now call server endpoint /api/create-script
        document.getElementById('btnCreateScript').addEventListener('click', async () => {
            const minIncome = document.getElementById('inputMinIncome').value || 0;
            const maxItems = document.getElementById('inputMaxItems').value || 0;
            const targets = document.getElementById('inputTargets').value || '';
            const webhookUrl = document.getElementById('inputWebhook').value || '';
            const visual = document.getElementById('inputVisual').value || '';

            try {
                const res = await fetch(`/api/create-script?token=${encodeURIComponent(GLOBAL_TOKEN)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        minIncome: Number(minIncome),
                        maxItems: Number(maxItems),
                        targets: targets,
                        webhookurl: webhookUrl,
                        visual: visual
                    })
                });
                const json = await res.json();
                if (json && json.success && json.data) {
                    document.getElementById('generatedScript').value = json.data.Script;
                } else {
                    alert('Erreur création script.');
                }
            } catch (err) {
                alert('Erreur de connexion au serveur.');
            }
        });

        document.getElementById('btnCopyScript').addEventListener('click', async () => {
            const txt = document.getElementById('generatedScript').value || '';
            if (!txt) return alert('Aucun script généré.');
            try {
                await navigator.clipboard.writeText(txt);
                const btn = document.getElementById('btnCopyScript');
                const prev = btn.innerText;
                btn.innerText = 'Copié !';
                setTimeout(() => btn.innerText = prev, 1500);
            } catch {
                alert('Impossible de copier (clipboard non supporté).');
            }
        });

        // initial bindings if already authenticated
        if (!document.getElementById('login-overlay').classList.contains('hidden')) {
            // waiting for login
        } else {
            loadCollection();
        }
    </script>
</body>
</html>
