<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez Script - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        
        /* Style des Cards */
        .card { background-color: #111827; border: 1px solid #1f2937; border-radius: 4px; position: relative; overflow: hidden; transition: all 0.2s; display: flex; flex-direction: column; }
        .card:hover { border-color: #a855f7; transform: translateY(-2px); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #a855f7; opacity: 0.5; }
        
        .search-input { background: #0f172a; border: 1px solid #334155; }
        
        /* NOUVEAU STYLE : Badge VERIFIED Ultra-Visible (style image) */
        .verified-badge { 
            background: #1d4ed8; /* Bleu solide */
            color: #ffffff; /* Texte blanc */
            border: 1px solid #3b82f6; /* Bordure plus claire */
            font-weight: 900;
            text-transform: uppercase;
            italic: true;
            font-size: 8px;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); /* Effet néon bleu */
        }
        
        /* Zone de texte du Script */
        .script-box {
            background-color: rgba(16, 17, 26, 0.6);
            border: 1px solid #1f2937;
            color: #d1d5db;
            font-family: 'mono', monospace;
            font-size: 10px;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            height: auto;
            min-height: 40px;
            word-break: break-all;
            margin-top: auto; /* Pousse vers le bas */
            resize: none;
            overflow: hidden;
            border-style: dashed; /* Style dashed pour indiquer la zone de code */
        }
        .script-box:focus { border-color: #a855f7; border-style: solid; color: white; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-wrap justify-between items-center gap-4 mb-8">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-purple-500 italic uppercase tracking-tighter">
                Rusteez <span class="text-white">Script</span>
            </h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">First Steal a Brainrot Scripts Collection</p>
        </div>
        
        <input type="text" id="search" oninput="renderScripts()" placeholder="Search scripts..." 
               class="search-input flex-1 max-w-md px-4 py-1.5 rounded text-xs focus:border-purple-500 outline-none">

        <div class="flex items-center gap-3 bg-purple-600/10 border border-purple-500/20 px-4 py-1.5 rounded">
            <span class="text-[9px] text-slate-500 uppercase font-black">Community</span>
            <span id="script-count" class="text-sm font-black text-purple-400">0 SCRIPTS</span>
        </div>
    </header>

    <main id="script-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
        </main>

    <script>
        let allScripts = [];

        async function fetchScripts() {
            const res = await fetch('/api/scripts');
            allScripts = await res.json();
            renderScripts();
        }

        function renderScripts() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('script-grid');
            const filtered = allScripts.filter(s => s.title.toLowerCase().includes(query) || s.description.toLowerCase().includes(query));
            
            document.getElementById('script-count').innerText = `${filtered.length} SCRIPTS`;

            grid.innerHTML = filtered.map(s => `
                <div class="card rounded p-0">
                    <div class="relative h-32 w-full bg-black/40">
                        <img src="${s.image}" class="w-full h-full object-cover opacity-60">
                        ${s.verified ? '<div class="absolute top-2 right-2 verified-badge"><i class="fas fa-check-circle"></i> VERIFIED</div>' : ''}
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <h2 class="text-xs font-black uppercase text-white truncate mr-2">${s.title}</h2>
                            <span class="text-[9px] text-slate-500 font-mono"><i class="fas fa-eye"></i> ${s.views}</span>
                        </div>
                        <p class="text-[10px] text-slate-400 mb-4 line-clamp-2 leading-relaxed">${s.description}</p>
                        
                        <textarea class="script-box" readonly onclick="this.select(); fetch('/api/script/view?id=${s._id}');">${s.code}</textarea>
                        <p class="text-[8px] text-slate-600 mt-1 italic">Click to select script text</p>
                    </div>
                </div>
            `).join('');
        }

        fetchScripts();
    </script>
</body>
</html>
