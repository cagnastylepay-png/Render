<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez Script - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        
        .card { background-color: #111827; border: 1px solid #1f2937; border-radius: 6px; position: relative; overflow: hidden; transition: all 0.2s; display: flex; flex-direction: column; height: 100%; }
        .card:hover { border-color: #a855f7; transform: translateY(-3px); box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.3); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #a855f7; opacity: 0.8; z-index: 10; }
        
        .search-input { background: #0f172a; border: 1px solid #334155; }
        
        .verified-badge { 
            background: #1d4ed8; 
            color: #ffffff; 
            border: 1px solid #3b82f6; 
            font-weight: 900;
            text-transform: uppercase;
            font-size: 8px;
            padding: 4px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            z-index: 20;
        }
        
        .script-box {
            background-color: rgba(16, 17, 26, 0.8);
            border: 1px dashed #374151;
            color: #a855f7; /* Texte en violet pour le code */
            font-family: 'Consolas', monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            min-height: 50px;
            word-break: break-all;
            margin-top: 12px;
            resize: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .script-box:hover { border-color: #a855f7; background-color: rgba(16, 17, 26, 1); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <header class="flex flex-wrap justify-between items-center gap-6 mb-10">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black text-purple-500 italic uppercase tracking-tighter">
                Rusteez <span class="text-white">Script</span>
            </h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Premium Script Collection</p>
        </div>
        
        <input type="text" id="search" oninput="renderScripts()" placeholder="Search scripts..." 
               class="search-input flex-1 max-w-lg px-5 py-2 rounded-md text-sm focus:border-purple-500 outline-none transition-all">

        <div class="flex items-center gap-4 bg-purple-600/10 border border-purple-500/20 px-5 py-2 rounded-md">
            <span class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Scripts</span>
            <span id="script-count" class="text-lg font-black text-purple-400">0</span>
        </div>
    </header>

    <main id="script-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </main>

    <script>
        let allScripts = [];

        async function fetchScripts() {
            try {
                const res = await fetch('/api/scripts');
                allScripts = await res.json();
                renderScripts();
            } catch(e) { console.error("Erreur de chargement", e); }
        }

        function renderScripts() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('script-grid');
            const filtered = allScripts.filter(s => s.title.toLowerCase().includes(query) || s.description.toLowerCase().includes(query));
            
            document.getElementById('script-count').innerText = filtered.length;

            grid.innerHTML = filtered.map(s => `
                <div class="card p-0">
                    <div class="relative w-full aspect-video bg-black/60 border-b border-gray-800">
                        <img src="${s.image}" class="w-full h-full object-cover opacity-80">
                        ${s.verified ? '<div class="absolute top-3 right-3 verified-badge"><i class="fas fa-check-circle"></i> VERIFIED</div>' : ''}
                    </div>
                    
                    <div class="p-4 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-sm font-black uppercase text-white tracking-tight">${s.title}</h2>
                            <span class="text-[10px] text-slate-500"><i class="fas fa-eye"></i> ${s.views}</span>
                        </div>
                        
                        <div class="text-[11px] text-slate-400 leading-relaxed whitespace-pre-line mb-2">
                            ${s.description}
                        </div>
                        
                        <div class="mt-auto">
                            <textarea class="script-box" readonly 
                                onclick="this.select(); document.execCommand('copy'); fetch('/api/script/view?id=${s._id}');"
                                title="Click to copy">${s.code}</textarea>
                            <p class="text-[9px] text-slate-600 mt-2 flex items-center gap-1">
                                <i class="fas fa-info-circle"></i> Click code to select & copy
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        fetchScripts();
    </script>
</body>
</html>
