<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez Script - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        .card { background-color: #111827; border: 1px solid #1f2937; position: relative; overflow: hidden; transition: all 0.2s; }
        .card:hover { border-color: #a855f7; transform: translateY(-2px); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #a855f7; opacity: 0.5; }
        .search-input { background: #0f172a; border: 1px solid #334155; }
        .btn-copy { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); color: #a855f7; font-weight: 900; text-transform: uppercase; }
        .btn-copy:hover { background: #a855f7; color: white; }
        .verified-badge { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-wrap justify-between items-center gap-4 mb-8">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-purple-500 italic uppercase tracking-tighter">
                Rusteez <span class="text-white">Script</span>
            </h1>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">First Steal a Brainrot Script site</p>
        </div>
        
        <input type="text" id="search" oninput="renderScripts()" placeholder="Search scripts..." 
               class="search-input flex-1 max-w-md px-4 py-1.5 rounded text-xs focus:border-purple-500 outline-none">

        <div class="flex items-center gap-3 bg-purple-600/10 border border-purple-500/20 px-4 py-1.5 rounded">
            <span class="text-[9px] text-slate-500 uppercase font-black">Community</span>
            <span id="script-count" class="text-sm font-black text-purple-400">0 SCRIPTS</span>
        </div>
    </header>

    <main id="script-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
        </main>

    <script>
        let allScripts = [];

        async function fetchScripts() {
            const res = await fetch('/api/scripts');
            allScripts = await res.json();
            renderScripts();
        }

        function renderScripts() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('script-grid');
            const filtered = allScripts.filter(s => s.title.toLowerCase().includes(query) || s.description.toLowerCase().includes(query));
            
            document.getElementById('script-count').innerText = `${filtered.length} SCRIPTS`;

            grid.innerHTML = filtered.map(s => `
                <div class="card rounded p-0 flex flex-col">
                    <div class="relative h-32 w-full bg-black/40">
                        <img src="${s.image}" class="w-full h-full object-cover opacity-60">
                        ${s.verified ? '<span class="absolute top-2 right-2 verified-badge text-[8px] px-2 py-0.5 rounded font-black uppercase italic"><i class="fas fa-check-circle"></i> Verified</span>' : ''}
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <h2 class="text-xs font-black uppercase text-white truncate mr-2">${s.title}</h2>
                            <span class="text-[9px] text-slate-500 font-mono"><i class="fas fa-eye"></i> ${s.views}</span>
                        </div>
                        <p class="text-[10px] text-slate-400 mb-4 line-clamp-2 leading-relaxed">${s.description}</p>
                        <button onclick="copyScript('${s.code.replace(/'/g, "\\'")}', '${s._id}')" 
                                class="btn-copy mt-auto py-1.5 rounded text-[9px] transition-all">
                            Copy Script
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function copyScript(code, id) {
            navigator.clipboard.writeText(code);
            fetch(`/api/script/view?id=${id}`);
            alert("Script copied to clipboard!");
        }

        fetchScripts();
    </script>
</body>
</html>
