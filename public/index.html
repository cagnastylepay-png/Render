<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #080a11; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 4px; }
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; color: #64748b; text-transform: uppercase; font-weight: 900; font-size: 10px; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .data-card { background: #111827; border: 1px solid #1f2937; transition: all 0.3s; position: relative; }
        .data-card:hover { border-color: #a855f7; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
        input, textarea { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
        input:focus, textarea:focus { border-color: #a855f7 !important; outline: none; }
        .copy-success { color: #10b981 !important; }
    </style>
</head>
<body class="p-6">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#080a11]">
        <div class="panel p-8 w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-xl font-black italic uppercase text-purple-500 mb-6">Rusteez <span class="text-white">Admin</span></h1>
            <input type="password" id="authInput" placeholder="Enter ADMIN_TOKEN..." class="w-full p-3 rounded text-center mb-4 outline-none">
            <button onclick="checkAuth()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-black uppercase text-[10px] tracking-widest transition-all">Access Dashboard</button>
            <p id="auth-error" class="text-red-500 text-[9px] mt-4 font-bold uppercase hidden italic underline">Invalid Token Access Denied</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/40 p-5 border border-slate-800 rounded">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Rusteez <span class="text-purple-500">Master</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Discord Bot Management</p>
            </div>
            <div id="status-badge" class="text-[9px] text-emerald-500 font-black uppercase flex items-center gap-2">
                System Online <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            </div>
        </header>

        <nav class="flex gap-1 mb-6 border-b border-slate-800">
            <button onclick="switchTab('discord')" id="tab-discord" class="tab-btn active px-8 py-4 text-purple-400">
                <i class="fab fa-discord mr-2"></i>Discord Bot
            </button>
        </nav>

        <section id="content-discord" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Post Script Update -->
            <div class="data-card p-6 rounded-xl border-t-4 border-t-indigo-600">
                <div class="mb-6">
                    <h3 class="text-lg font-black text-white uppercase italic">Post Script Update</h3>
                    <p class="text-slate-500 text-[10px] uppercase">Send system logs to <span class="text-indigo-400">#updates</span></p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">Update Title</label>
                        <input type="text" id="update-title" placeholder="ex: Version 3.0 - NEW BYPASS" 
                            class="w-full rounded p-2 text-xs">
                    </div>
                    
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">Modifications / Logs</label>
                        <textarea id="update-content" placeholder="• Added new features&#10;• Fixed trade crash" 
                            class="w-full h-32 rounded p-2 text-xs font-mono resize-none"></textarea>
                    </div>

                    <button onclick="postUpdate()" id="btn-post-update"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3 rounded uppercase text-[10px] tracking-widest transition-all flex items-center justify-center">
                        <i class="fas fa-paper-plane mr-2"></i> Publish Update
                    </button>
                </div>
            </div>

            <!-- Post New Script -->
            <div class="data-card p-6 rounded-xl border-t-4 border-t-purple-600">
                <div class="mb-6">
                    <h3 class="text-lg font-black text-white uppercase italic">Post New Script</h3>
                    <p class="text-slate-500 text-[10px] uppercase">Share a new LUA script with preview</p>
                </div>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">Script Title</label>
                            <input type="text" id="script-title" placeholder="Ex: Auto-Farm Deluxe" class="w-full rounded p-2 text-xs">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">Script Image URL</label>
                            <input type="text" id="script-image" placeholder="https://i.imgur.com/..." class="w-full rounded p-2 text-xs">
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">Script Description</label>
                        <input type="text" id="script-desc" placeholder="Best script for the current event" class="w-full rounded p-2 text-xs">
                    </div>
                    
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-black mb-1 block">LUA Code</label>
                        <textarea id="script-code" placeholder='loadstring(game:HttpGet("https://pastefy.app/UemxWJ1q/raw", true))()' 
                            class="w-full h-32 rounded p-2 text-xs font-mono resize-none text-purple-300"></textarea>
                    </div>

                    <button onclick="postScript()" id="btn-post-script"
                        class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded uppercase text-[10px] tracking-widest transition-all flex items-center justify-center">
                        <i class="fas fa-code mr-2"></i> Publish Script
                    </button>
                </div>
            </div>

        </section>
    </div>

    <script>
        let GLOBAL_TOKEN = "";
        
        async function checkAuth() {
            const input = document.getElementById('authInput').value;
            if (!input) return;
            
            // Simulation ou appel API réel
            try {
                const res = await fetch(`/api/admin/verify?token=${input}`);
                const data = await res.json();
                if (data.success) {
                    proceedToDashboard(input);
                } else { throw new Error(); }
            } catch { 
                // Pour test local sans API
                if(input === "admin") { proceedToDashboard(input); } 
                else { document.getElementById('auth-error').classList.remove('hidden'); }
            }
        }

        function proceedToDashboard(token) {
            GLOBAL_TOKEN = token;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
        }

        async function postUpdate() {
            const title = document.getElementById('update-title').value;
            const content = document.getElementById('update-content').value;
            const btn = document.getElementById('btn-post-update');
        
            if (!title || !content) return alert("Veuillez remplir tous les champs !");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> Sending...';
        
            try {
                const response = await fetch('/api/admin/post-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: GLOBAL_TOKEN, title, content })
                });
        
                if (response.ok) {
                    alert("✅ Update publiée !");
                    document.getElementById('update-title').value = "";
                    document.getElementById('update-content').value = "";
                } else { alert("❌ Erreur lors de l'envoi."); }
            } catch (err) { alert("❌ Erreur serveur (API non connectée)."); } 
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Publish Update';
            }
        }

        async function postScript() {
    const title = document.getElementById('script-title').value;
    const image = document.getElementById('script-image').value;
    const desc = document.getElementById('script-desc').value;
    const code = document.getElementById('script-code').value;
    const btn = document.getElementById('btn-post-script');

    // Validation locale
    if (!title || !code) {
        alert("Le titre et le code sont obligatoires !");
        return;
    }

    // État de chargement du bouton
    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> Sending...';

    try {
        // Envoi vers la nouvelle route dédiée : /api/admin/post-script
        const response = await fetch('/api/admin/post-script', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                token: GLOBAL_TOKEN, // Ton token admin global
                title, 
                image, 
                description: desc, 
                lua: code 
            })
        });

        const result = await response.json();

        if (response.ok) {
            alert("✅ Script publié avec succès sur Discord !");
            
            // Reset des champs du formulaire
            document.getElementById('script-title').value = "";
            document.getElementById('script-image').value = "";
            document.getElementById('script-desc').value = "";
            document.getElementById('script-code').value = "";
        } else { 
            alert(`❌ Erreur : ${result.error || "Publication échouée"}`); 
        }
    } catch (err) { 
        alert("❌ Erreur serveur lors de la connexion."); 
    } finally {
        // Restauration de l'état du bouton
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

        
        function switchTab(name) {
            // Logique de switch si vous rajoutez des onglets plus tard
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + name).classList.remove('hidden');
            document.getElementById('tab-' + name).classList.add('active');
        }
    </script>
</body>
</html>
