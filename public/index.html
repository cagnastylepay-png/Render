<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MozilHook Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .hit-card { background: #1e293b; border-top: 4px solid #3b82f6; transition: all 0.3s; }
        .hit-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .log-entry { font-family: 'Consolas', monospace; font-size: 0.75rem; border-bottom: 1px solid #334155; padding: 2px 0; }
        .receiver-tag { background: #334155; color: #94a3b8; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 4px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6">
    <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-black tracking-tight text-white">MOZIL<span class="text-blue-500">HOOK</span></h1>
            <p class="text-slate-400 text-sm">Real-time Hit Explorer</p>
        </div>
        <div id="status" class="flex items-center gap-2 px-3 py-1 rounded-full bg-green-500/10 text-green-400 text-xs font-bold border border-green-500/50">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM LIVE
        </div>
    </header>

    <div id="hits-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        </div>

    <script>
        const socket = io();
        const container = document.getElementById('hits-container');

        // Initial Load
        fetch('/api/hits')
            .then(res => res.json())
            .then(hits => hits.forEach(renderHit));

        function renderHit(hit) {
            let card = document.getElementById(`hit-${hit.hitId}`);
            
            const content = `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-mono text-slate-500 bg-slate-900 px-2 py-1 rounded">ID: ${hit.hitId}</span>
                    <span class="text-[10px] text-slate-400">${new Date(hit.timestamp).toLocaleString()}</span>
                </div>

                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-white leading-tight">${hit.displayName || hit.username}</h2>
                    <p class="text-blue-400 text-sm font-medium">@${hit.username}</p>
                </div>

                <div class="mb-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Available Receivers</p>
                    <div class="flex flex-wrap gap-1">
                        ${hit.receivers && hit.receivers.length > 0 
                            ? hit.receivers.map(r => `<span class="receiver-tag">${r}</span>`).join('') 
                            : '<span class="text-slate-600 text-xs italic">No receivers listed</span>'}
                    </div>
                </div>
                
                <div class="mb-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Target Items (${hit.items.length})</p>
                    <div class="text-xs text-slate-300 h-28 overflow-y-auto bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                        ${hit.items.map(i => `<div class="mb-1 border-b border-slate-800 pb-1 text-slate-400">${i}</div>`).join('')}
                    </div>
                </div>

                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Live Trade Logs</p>
                    <div id="logs-${hit.hitId}" class="h-40 overflow-y-auto bg-black rounded-lg p-3 border border-slate-800">
                        ${hit.logs && hit.logs.length > 0 
                            ? hit.logs.map(l => `<div class="log-entry text-green-500/90">${l}</div>`).join('') 
                            : '<div class="text-slate-700 italic text-xs">Awaiting bot feedback...</div>'}
                    </div>
                </div>
            `;

            if (card) {
                card.innerHTML = content;
            } else {
                card = document.createElement('div');
                card.id = `hit-${hit.hitId}`;
                card.className = 'hit-card p-6 rounded-2xl shadow-xl';
                card.innerHTML = content;
                container.prepend(card);
            }
            
            // Scroll logs to bottom
            const logBox = document.getElementById(`logs-${hit.hitId}`);
            if (logBox) logBox.scrollTop = logBox.scrollHeight;
        }

        socket.on('newHit', renderHit);
        socket.on('updateHit', renderHit);

        socket.on('disconnect', () => {
            const status = document.getElementById('status');
            status.className = "flex items-center gap-2 px-3 py-1 rounded-full bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/50";
            status.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full"></span> CONNECTION LOST';
        });
    </script>
</body>
</html>
